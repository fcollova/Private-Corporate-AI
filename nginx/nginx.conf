# DESCRIPTION: Nginx configuration file for the reverse proxy (OPTIMIZED).
# =============================================================================

worker_processes auto;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server_tokens off;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Buffer generosi per header e cookie (evita 500/502 con Open WebUI)
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       100M;

    # Rate limiting rilassato per ambiente corporate
    limit_req_zone $binary_remote_addr zone=webui_limit:10m  rate=2000r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=500r/m;
    limit_req_status 429;

    upstream webui_backend {
        server open_webui:8080;
        keepalive 32;
    }

    upstream rag_backend {
        server rag_backend:8000;
        keepalive 16;
    }

    upstream console_backend {
        server console:3000;
        keepalive 8;
    }

    server {
        listen      80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen      443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        # Header di sicurezza (ottimizzati per non rompere le SPA)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ------------------------------------------------------------------
        # ROUTING DOCUMENT CONSOLE — /console/
        # ------------------------------------------------------------------
        location /console/ {
            limit_req zone=webui_limit burst=200 nodelay;
            proxy_pass http://console_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # ROUTING RAG BACKEND — /api/rag/
        # ------------------------------------------------------------------
        location /api/rag/ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/api/rag/(.*)$ /api/$1 break;
            proxy_pass http://rag_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger & Metrics
        location /rag-docs { rewrite ^/rag-docs(.*)$ /docs$1 break; proxy_pass http://rag_backend; }
        location /rag-metrics { rewrite ^/rag-metrics$ /metrics break; proxy_pass http://rag_backend; }
        location /rag/v1/ { rewrite ^/rag/v1/(.*)$ /v1/$1 break; proxy_pass http://rag_backend; }

        # ------------------------------------------------------------------
        # ROUTING OPEN WEBUI — / (Default)
        # ------------------------------------------------------------------
        location / {
            limit_req zone=webui_limit burst=300 nodelay;
            proxy_pass http://webui_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Buffering off per streaming LLM
            proxy_buffering off;
            proxy_cache off;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error": "Servizio in fase di avvio o non disponibile", "code": 502}';
            add_header Content-Type application/json;
        }
    }
}
