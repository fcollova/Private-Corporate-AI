# =============================================================================
# PRIVATE CORPORATE AI — Configurazione Nginx Reverse Proxy
# =============================================================================
# Funzionalità:
#   - Redirect HTTP → HTTPS automatico
#   - Terminazione SSL/TLS
#   - Routing intelligente:
#       / e /api/webui/* → Open WebUI (porta 8080)
#       /api/rag/*       → RAG Backend (porta 8000)
#       /rag-docs        → Swagger UI RAG Backend
#   - Header di sicurezza
#   - Rate limiting
#   - Compressione Gzip
#   - Logging strutturato
# =============================================================================
# Prerequisiti certificati SSL:
#   Self-signed (test): Vedi Deployment Guide
#   Produzione: Usa Certbot/Let's Encrypt
# =============================================================================

# Numero processi worker (auto = un core per CPU)
worker_processes auto;

# Limite connessioni aperte per worker
events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {

    # -------------------------------------------------------------------------
    # IMPOSTAZIONI BASE
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Nascondi versione Nginx (sicurezza)
    server_tokens off;

    # Performance I/O
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # LOGGING STRUTTURATO (JSON-like per analisi con ELK/Grafana)
    # -------------------------------------------------------------------------
    log_format corporate_log escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/access.log corporate_log;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # COMPRESSIONE GZIP
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1000;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # RATE LIMITING — Protezione da abusi
    # -------------------------------------------------------------------------
    # Zona per limitare richieste per IP (10MB di memoria = ~160k IP)
    limit_req_zone $binary_remote_addr zone=webui_limit:10m  rate=300r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=120r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # UPSTREAM — Pool di backend
    # -------------------------------------------------------------------------
    upstream webui_backend {
        server open_webui:8080;
        keepalive 32;
    }

    upstream rag_backend {
        server rag_backend:8000;
        keepalive 16;
    }

    upstream console_backend {
        server console:3000;
        keepalive 4;
    }

    # -------------------------------------------------------------------------
    # SERVER BLOCK 1: HTTP → HTTPS Redirect
    # -------------------------------------------------------------------------
    server {
        listen      80;
        listen      [::]:80;
        server_name _;   # Accetta qualsiasi hostname

        # Redirect permanente a HTTPS
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # SERVER BLOCK 2: HTTPS — Server Principale
    # -------------------------------------------------------------------------
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name _;   # Sostituire con il dominio reale in produzione

        # ------------------------------------------------------------------
        # SSL/TLS CONFIGURAZIONE
        # ------------------------------------------------------------------
        # ⚠️ PLACEHOLDER: Sostituire con certificati reali
        # Per certificati self-signed (test): vedi Deployment Guide
        # Per produzione: usare Let's Encrypt con Certbot
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Protocolli e cipher suite sicuri (Mozilla Modern Config)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS — Forza HTTPS per 1 anno (attenzione: difficile da rimuovere)
        # Decommentare solo in produzione con certificati validi
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ------------------------------------------------------------------
        # HEADER DI SICUREZZA
        # ------------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content Security Policy — Personalizzare in base alle esigenze
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

        # ------------------------------------------------------------------
        # DIMENSIONE UPLOAD — Max 100MB per documenti grandi
        # ------------------------------------------------------------------
        client_max_body_size 100M;
        client_body_buffer_size 16k;

        # ------------------------------------------------------------------
        # TIMEOUT — Adeguati per richieste LLM (possono essere lente)
        # ------------------------------------------------------------------
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;   # 5 min per risposte LLM lunghe
        proxy_read_timeout    300s;
        send_timeout          300s;

        # ------------------------------------------------------------------
        # HEADER PROXY COMUNI
        # ------------------------------------------------------------------
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";   # Necessario per WebSocket (Open WebUI)

        # ------------------------------------------------------------------
        # ROUTING RAG BACKEND — /api/rag/* → FastAPI (porta 8000)
        # ------------------------------------------------------------------
        location /api/rag/ {
            # Rate limiting upload
            location /api/rag/documents/upload {
                limit_req zone=upload_limit burst=3 nodelay;
                proxy_pass http://rag_backend/api/documents/upload;
            }

            # Rate limiting generale API
            limit_req zone=api_limit burst=30 nodelay;
            rewrite ^/api/rag/(.*)$ /api/$1 break;
            proxy_pass http://rag_backend;
        }

        # Swagger UI del RAG Backend (utile per sviluppo)
        location /rag-docs {
            limit_req zone=api_limit burst=5 nodelay;
            rewrite ^/rag-docs(.*)$ /docs$1 break;
            proxy_pass http://rag_backend;
        }

        location /rag-redoc {
            rewrite ^/rag-redoc(.*)$ /redoc$1 break;
            proxy_pass http://rag_backend;
        }

        # Metriche Prometheus (⚠️ restringere accesso in produzione!)
        location /rag-metrics {
            # Decommentare per restringere accesso alla rete interna
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
            rewrite ^/rag-metrics$ /metrics break;
            proxy_pass http://rag_backend;
        }

        # ------------------------------------------------------------------
        # ROUTING OpenAI-compatible API — accessibile dal browser
        # Usare questo URL in WebUI: https://<host>/rag/v1
        # ------------------------------------------------------------------
        location /rag/v1/ {
            limit_req zone=api_limit burst=30 nodelay;
            rewrite ^/rag/v1/(.*)$ /v1/$1 break;
            proxy_pass http://rag_backend;
        }

        # Document Management Console
        location /console/ {
            limit_req zone=webui_limit burst=50 nodelay;

            proxy_pass         http://console_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
        }

        # ------------------------------------------------------------------
        # ROUTING OPEN WEBUI — tutto il resto → Open WebUI (porta 8080)
        # ------------------------------------------------------------------
        location / {
            # burst=100: permette picchi fino a 100 richieste istantanee
            # (necessario per il caricamento iniziale della SPA)
            limit_req zone=webui_limit burst=100 nodelay;
            proxy_pass http://webui_backend;

            # Buffering disabilitato per streaming risposte LLM
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ------------------------------------------------------------------
        # PAGINA ERRORE PERSONALIZZATA
        # ------------------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error": "Servizio temporaneamente non disponibile. Riprovare tra qualche istante.", "code": 502}';
            add_header Content-Type application/json;
        }
    }
}
