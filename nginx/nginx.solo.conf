# DESCRIPTION: Nginx configuration for SOLO Mode (Lightweight, no Redis/Node).
# =============================================================================

worker_processes auto;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server_tokens off;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Buffer for Open WebUI
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       100M;

    upstream webui_backend {
        server open_webui:8080;
        keepalive 32;
    }

    upstream rag_backend {
        server rag_backend:8000;
        keepalive 16;
    }

    server {
        listen      80;
        server_name _;

        # ------------------------------------------------------------------
        # DOCUMENT CONSOLE — /console/ (Served as STATIC FILES)
        # ------------------------------------------------------------------
        location /console/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /console/index.html;
        }

        # ------------------------------------------------------------------
        # RAG BACKEND — /api/rag/
        # ------------------------------------------------------------------
        location /api/rag/ {
            rewrite ^/api/rag/(.*)$ /api/$1 break;
            proxy_pass http://rag_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger & Metrics
        location /rag-docs { rewrite ^/rag-docs(.*)$ /docs$1 break; proxy_pass http://rag_backend; }
        location /rag-metrics { rewrite ^/rag-metrics$ /metrics break; proxy_pass http://rag_backend; }
        location /rag/v1/ { rewrite ^/rag/v1/(.*)$ /v1/$1 break; proxy_pass http://rag_backend; }

        # ------------------------------------------------------------------
        # OPEN WEBUI — / (Default)
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://webui_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Buffering off for LLM streaming
            proxy_buffering off;
            proxy_cache off;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error": "Service starting or unavailable (SOLO Mode)", "code": 502}';
            add_header Content-Type application/json;
        }
    }
}
