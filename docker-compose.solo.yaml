# =============================================================================
# PRIVATE CORPORATE AI — Docker Compose SOLO Mode
# Optimized for 1-3 users, single machine, professional studio.
# 5 Containers: Ollama, Qdrant, RAG Backend, Open WebUI, Nginx (Static)
# =============================================================================

version: "3.9"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  webui_data:
    driver: local
  rag_uploads:
    driver: local
  rag_data:
    driver: local
  nginx_logs:
    driver: local

services:

  # 1. OLLAMA
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: corporate_ai_ollama
    restart: unless-stopped
    networks:
      - backend_net
    ports:
      - "127.0.0.1:11434:11434"         # Esposto solo su localhost per accesso diretto (Claude Code, dev tools)
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_THREADS=${OLLAMA_CPU_THREADS:-0}
      - TZ=${TZ:-Europe/Rome}
    # GPU block can be patched/removed by install.sh for LITE solo

  # 2. OLLAMA MODEL PULLER
  ollama_init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: corporate_ai_ollama_init
    restart: on-failure
    networks:
      - backend_net
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo '==> SOLO MODE: Pulling models...';
        ollama pull ${LLM_MODEL};
        ollama pull ${EMBEDDING_MODEL};
        echo '==> Models ready!';
      "
    volumes:
      - ollama_data:/root/.ollama

  # 3. QDRANT
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: corporate_ai_qdrant
    restart: unless-stopped
    networks:
      - backend_net
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-changeme}
      - QDRANT__LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Europe/Rome}

  # 4. RAG BACKEND (Single worker, no Redis)
  rag_backend:
    build:
      context: ./rag_backend
      dockerfile: Dockerfile
    container_name: corporate_ai_rag
    restart: unless-stopped
    networks:
      - frontend_net
      - backend_net
    volumes:
      - rag_uploads:/app/uploads
      - rag_data:/app/data
      - ./rag_backend:/app
    environment:
      # LLM
      - LLM_MODEL=${LLM_MODEL:-gemma2:9b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_CONTEXT_WINDOW=${LLM_CONTEXT_WINDOW:-4096}
      # Qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-changeme}
      # RAG
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-5}
      # Sistema
      - DEPLOY_MODE=${DEPLOY_MODE:-gpu}
      - TZ=${TZ:-Europe/Rome}
      - OLLAMA_BASE_URL=http://ollama:11434
      # Solo Mode Specifics
      - WEB_WORKERS=1
      - EMBEDDING_CACHE_ENABLED=false
      - REDIS_URL=""
    depends_on:
      - ollama
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # 5. OPEN WEBUI
  open_webui:
    image: ${WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: corporate_ai_webui
    restart: unless-stopped
    networks:
      - frontend_net
      - backend_net
    volumes:
      - webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://rag_backend:8000/v1
      - OPENAI_API_KEY=not-required-local
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme_secret}
      - ENABLE_SIGNUP=${WEBUI_AUTH:-true}
      - WEBUI_NAME=${WEBUI_NAME:-Private Corporate AI (SOLO)}
      - TZ=${TZ:-Europe/Rome}
    depends_on:
      rag_backend:
        condition: service_healthy

  # 6. NGINX (SOLO VERSION - Serving Static Console)
  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: corporate_ai_nginx
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.solo.conf:/etc/nginx/nginx.conf:ro
      - ./console/dist:/usr/share/nginx/html/console:ro
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=${TZ:-Europe/Rome}
    depends_on:
      - open_webui
      - rag_backend
